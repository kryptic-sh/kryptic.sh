    </radialGradient>
    <radialGradient id="bg2" cx="85%" cy="20%" r="50%">
      <stop offset="0" stop-color="#7aa2f7" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#7aa2f7" stop-opacity="0"/>
