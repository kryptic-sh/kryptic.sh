      <stop offset="0" stop-color="#ff9e64"/>
      <stop offset="0.45" stop-color="#7ee787"/>
      <stop offset="0.75" stop-color="#7aa2f7"/>
      <stop offset="1" stop-color="#bb9af7"/>
    </linearGradient>
    <radialGradient id="bg1" cx="15%" cy="0%" r="55%">
      <stop offset="0" stop-color="#ff9e64" stop-opacity="0.14"/>
